<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Halil</title>
    
    <link rel="stylesheet" href="styles/style.css">
    
    <style>
        body {
            padding-bottom: 80px; 
        }

        .contact-container {
            width: 600px;
            margin: 40px auto;
            padding: 30px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            box-sizing: border-box; 
        }

        .contact-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        /* Input, select ve textarea için Box Model ayarları */
        .contact-container input, 
        .contact-container select, 
        .contact-container textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #aaa;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* YENİ: Checkbox'ların %100 genişlik alıp bozulmasını engellemek için özel ayar */
        .contact-container input[type="checkbox"] {
            width: auto; /* Genişliği normale döndürür */
            margin-bottom: 0;
            margin-right: 8px; /* Yazı ile kutucuk arasına boşluk ekler */
            cursor: pointer;
        }

        /* YENİ: Checkbox grubunu hizalamak için */
        .checkbox-group {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* YENİ: Checkbox etiketlerinin kalınlığını alıp yan yana dizmek için */
        .checkbox-group label {
            display: inline-block;
            font-weight: normal;
            margin-right: 20px;
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* YENİ: Dosya yükleme (CV) butonu için ufak görsel düzeltme */
        .contact-container input[type="file"] {
            padding: 9px;
            background-color: #fff;
            cursor: pointer;
        }

        .contact-container button[type="submit"] {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s, color 0.3s;
        }

        .contact-container button[type="submit"]:hover {
            background-color: #ffcc00; 
            color: #333;
        }
    </style>
</head>
<body>

    
    <nav>
        <ul>
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="about.html">Hakkımda</a></li>
            <li><a href="interests.html">İlgi Alanlarım</a></li>
            <li><a href="contact.html">İletişim</a></li>
        </ul>
    </nav>

    <div class="container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2>İletişim Bilgilerim</h2>
            <p><strong>E-posta:</strong> halilibrahimacik5860@gmail.com</p>
            <p><strong>Telefon Numarası:</strong> 05529841336</p>
        </div>

        <div class="contact-container">
            <h2 style="text-align: center;">Bana Mesaj Gönderin</h2>
            
            <form action="#" method="POST" enctype="multipart/form-data">
                
                <label for="ad-soyad">Ad Soyad</label>
                <input type="text" id="ad-soyad" name="ad-soyad" placeholder="Adınızı ve soyadınızı girin" required>

                <label for="eposta">E-posta</label>
                <input type="email" id="eposta" name="eposta" placeholder="E-posta adresinizi girin" required>

                <label for="konu">Konu</label>
                <select id="konu" name="konu" required>
                    <option value="" disabled selected>Lütfen bir konu seçiniz</option>
                    <option value="is_teklifi">İş Teklifi</option>
                    <option value="soru">Soru</option>
                    <option value="geri_bildirim">Geri Bildirim</option>
                </select>

                <label>İlgi Alanları</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="ilgi" value="gomulu_sistemler"> Gömülü Sistemler</label>
                    <label><input type="checkbox" name="ilgi" value="yapay_zeka"> Makine Öğrenmesi & Yapay Zeka</label>
                    <label><input type="checkbox" name="ilgi" value="yazilim"> Yazılım Geliştirme (Java/Kotlin vb.)</label>
                </div>

                <label for="cv-dosya">CV Yükle (PDF veya DOCX)</label>
                <input type="file" id="cv-dosya" name="cv-dosya" accept=".pdf, .doc, .docx">

                <label for="mesaj">Mesaj</label>
                <textarea id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazabilirsiniz..." required></textarea>

                <button type="submit">Gönder</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 Halil | Web Programlama Dersi</p>
    </footer>

</body>
</html>
