<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Halil</title>
    
    <link rel="stylesheet" href="styles/style.css">
    
    <style>
        /* Footer fixed (sabit) olduğu için formun en altı kapanmasın diye boşluk bırakıyoruz */
        body {
            padding-bottom: 80px; 
        }

        /* 1, 2, 3. Gereksinimler: Container genişliği, ortalama, padding ve kenarlıklar */
        .contact-container {
            width: 600px; /* Genişlik */
            margin: 40px auto; /* Sayfayı ortalar */
            padding: 30px; /* Elemanların kenara yapışmasını engeller */
            border: 2px solid #ccc; /* Belirgin kenarlık */
            border-radius: 10px; /* Köşe yuvarlama */
            background-color: #f9f9f9;
            box-sizing: border-box; 
        }

        .contact-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        /* 4. Gereksinim: Çoklu seçici (input, select, textarea) ve kutu modeli (Box Model) ayarları */
        .contact-container input, 
        .contact-container select, 
        .contact-container textarea {
            width: 100%; /* Bulunduğu alanı tam kaplama */
            padding: 12px; /* İçerisine yazı yazıldığında ferah durması için */
            margin-bottom: 20px; /* Altındaki elemanla arasına boşluk */
            border: 1px solid #aaa;
            border-radius: 5px;
            box-sizing: border-box; /* Padding'in width değerini taşırmasını engeller */
            font-family: inherit;
        }

        /* 5. Gereksinim: Gönder Butonu Özelleştirmesi */
        .contact-container button[type="submit"] {
            background-color: #333; /* Menü ile uyumlu koyu renk */
            color: white;
            border: none; /* Kenarlık kaldırıldı */
            padding: 15px 30px; /* Sağ-sol ve alt-üst padding verilerek büyütüldü */
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Menüdeki hover (sarı) efektinin aynısı butona da uygulandı */
        .contact-container button[type="submit"]:hover {
            background-color: #ffcc00; 
            color: #333;
        }
    </style>
</head>
<body>

        <ul>
            <li><a href="index.html">Anasayfa</a></li>
            <li><a href="about.html">Hakkımda</a></li>
            <li><a href="interests.html">İlgi Alanlarım</a></li>
            <li><a href="contact.html">İletişim</a></li>
        </ul>
    </nav>

    <div class="container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2>İletişim Bilgilerim</h2>
            <p><strong>E-posta:</strong> halilibrahimacik5860@gmail.com</p>
            <p><strong>Telefon numarası:</strong> 05529841336</p>
        </div>

        <div class="contact-container">
            <h2 style="text-align: center;">Bana Mesaj Gönderin</h2>
            <form action="#" method="POST">
                
                <label for="ad-soyad">Ad Soyad</label>
                <input type="text" id="ad-soyad" name="ad-soyad" placeholder="Adınızı ve soyadınızı girin" required>

                <label for="eposta">E-posta</label>
                <input type="email" id="eposta" name="eposta" placeholder="E-posta adresinizi girin" required>

                <label for="konu">Konu</label>
                <select id="konu" name="konu" required>
                    <option value="" disabled selected>Lütfen bir konu seçiniz</option>
                    <option value="is_birliği">İş Birliği</option>
                    <option value="soru">Soru</option>
                    <option value="geri_bildirim">Geri Bildirim</option>
                    <option value="mentörlük">Mentörlük</option>
                </select>

                <label for="mesaj">Mesaj</label>
                <textarea id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazabilirsiniz..." required></textarea>

                <button type="submit">Gönder</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 Halil | Web Programlama Dersi</p>
    </footer>

</body>
</html>
